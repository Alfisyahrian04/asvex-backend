apiVersion: autoscaling/v2

kind:
  HorizontalPodAutoscaler

metadata:
  name: marketplace-hpa

spec:

  scaleTargetRef:

    apiVersion: apps/v1

    kind: Deployment

    name:
      marketplace-backend

  minReplicas: 3

  maxReplicas: 20

  metrics:

    - type: Resource

      resource:

        name: cpu

        target:

          type: Utilization

          averageUtilization: 70
