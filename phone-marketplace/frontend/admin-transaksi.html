<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Transaksi Admin</title>

<link rel="stylesheet" href="css/admin.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>
</head>

<body>

<header class="admin-topbar">
<div class="admin-logo">AL ADMIN</div>
<div class="admin-badge">SUPER ADMIN</div>
</header>

<main class="admin-container">

<!-- VALIDASI PEMBAYARAN -->

<div class="admin-section">

<div class="section-header">
<div class="line"></div>
<h2>Validasi Pembayaran</h2>
</div>

<div
id="payment-list"
class="admin-grid"
>
<div class="empty-state">
Belum ada pembayaran
</div>
</div>

</div>

<!-- TRANSAKSI BERLANGSUNG -->
<div class="admin-section">
<div class="section-header">
<div class="line"></div>
<h2>Transaksi Berlangsung</h2>
</div>

<div
id="ongoing-orders-list"
class="admin-grid"
></div>
</div>

<!-- PAYOUT REQUESTS -->

<div class="admin-section">

  <div class="section-header">
    <div class="line"></div>
    <h2>Payout Requests</h2>
  </div>

  <div
    id="payout-list"
    class="admin-grid"
  >
    <div class="empty-state">
      Belum ada payout request
    </div>
  </div>

</div>

<!-- REFUND -->
<div class="admin-section">
<div class="section-header">
<div class="line"></div>
<h2>Refund Requests</h2>
</div>

<div id="refund-list"></div>
</div>
<div
id="appeal-detail-modal"
style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
z-index:99999;

align-items:center;
justify-content:center;

padding:20px;
box-sizing:border-box;
"
>

<div
<div
style="
background:#fff;
width:100%;
max-width:500px;

border-radius:24px;
padding:24px;

box-shadow:0 10px 30px rgba(0,0,0,.15);

max-height:90vh;
overflow-y:auto;
"
>

<h3>Detail Banding Seller</h3>

<p
id="appeal-detail-reason"
style="margin-top:12px;"
>
</p>

<button
id="appeal-detail-photo-btn"
style="
display:none;
width:100%;
height:48px;
margin-top:14px;

background:#fff;
color:#111827;

border:none;
border-radius:12px;

font-weight:600;

box-shadow:0 2px 8px rgba(0,0,0,.12);
"
>
📷 Lihat Foto Bukti
</button>

<button
id="appeal-detail-video-btn"
style="
display:none;
width:100%;
height:48px;
margin-top:10px;

background:#fff;
color:#111827;

border:none;
border-radius:12px;

font-weight:600;

box-shadow:0 2px 8px rgba(0,0,0,.12);
"
>
🎥 Lihat Video Bukti
</button>

<button
id="approve-appeal-btn"
style="
width:100%;
height:48px;
margin-top:14px;
background:#16a34a;
color:white;
border:none;
border-radius:12px;
font-weight:700;
"
>
Terima Banding
</button>

<button
id="reject-appeal-btn"
style="
width:100%;
height:48px;
margin-top:10px;
background:#ef4444;
color:white;
border:none;
border-radius:12px;
font-weight:700;
"
>
Tolak Banding
</button>

<button
onclick="closeAppealDetailModal()"
style="
width:100%;
height:48px;
margin-top:10px;
border:none;
border-radius:12px;
"
>
Tutup
</button>

</div>

</div>
</main>


<nav class="admin-nav">

<a href="admin.html" class="admin-nav-item">
<i class="fa-solid fa-chart-line"></i>
<span>Dashboard</span>
</a>

<a href="admin-transaksi.html"
class="admin-nav-item active">
<i class="fa-solid fa-money-check-dollar"></i>
<span>Transaksi</span>
</a>

<a href="admin-seller.html"
class="admin-nav-item">
<i class="fa-solid fa-store"></i>
<span>Seller</span>
</a>

<a href="#"
class="admin-nav-item">
<i class="fa-solid fa-headset"></i>
<span>CS</span>
</a>

<a href="admin-profile.html"
class="admin-nav-item">
<i class="fa-solid fa-user-shield"></i>
<span>Akun</span>
</a>

</nav>

<script src="./js/pages/admin.js?v=10001"></script>

</body>
</html>
