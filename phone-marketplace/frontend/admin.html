<body>

<header class="admin-topbar">

<div class="admin-logo">
AL ADMIN
</div>

<div class="admin-badge">
SUPER ADMIN
</div>

</header>

<main class="admin-container">

<h1 class="admin-title">
Dashboard Admin
</h1>

<!-- PAYMENT VALIDATION -->

<div class="admin-section">

<div class="section-header">

<div class="line"></div>

<h2>
Validasi Pembayaran
</h2>

</div>

<div
id="payment-list"
class="admin-grid"
>

<div class="empty-state">
Belum ada pembayaran
</div>

</div>

</div>

<!-- SELLER -->

<div class="admin-section">

<div class="section-header">

<div class="line"></div>

<h2>
Seller Verification
</h2>

</div>

<div
id="seller-list"
class="admin-grid"
>

</div>

</div>

<!-- PAYOUT -->

<div class="admin-section">

<div class="section-header">

<div class="line"></div>

<h2>
Payout Requests
</h2>

</div>

<div
id="payout-list"
class="admin-grid"
>

</div>

</div>

<!-- REFUND REQUESTS PATCH -->

<div class="admin-section">

<div class="section-header">

<div class="line"></div>

<h2>
Refund Requests
</h2>

</div>

<div
id="refund-list"
class="admin-grid"
>

<div class="empty-state">
Belum ada refund request
</div>

</div>

</div>

</main>

<nav class="admin-nav">

>

<div
id="appeal-detail-modal"
style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
z-index:9999;
padding:20px;
overflow:auto;
"
>

<div
style="
background:#fff;
border-radius:18px;
padding:18px;
max-width:500px;
margin:40px auto;
"
>

<h3>Detail Banding Seller</h3>

<p id="appeal-detail-reason"></p>

<details style="margin-top:12px;">
  <summary>Detail Foto ▼</summary>
  <img
    id="appeal-detail-photo"
    style="
      width:100%;
      display:none;
      border-radius:12px;
      margin-top:12px;
    "
  >
</details>

<details style="margin-top:12px;">
  <summary>Detail Video ▼</summary>
  <video
    id="appeal-detail-video"
    controls
    style="
      width:100%;
      display:none;
      border-radius:12px;
      margin-top:12px;
    "
  ></video>
</details>


<div
style="
display:flex;
gap:12px;
margin-top:16px;
"
>

<button
id="approve-appeal-btn"
class="password-btn"
style="
flex:1;
background:#16a34a;
height:46px;
"
>
ACC Banding
</button>


<button
id="reject-appeal-btn"
class="password-btn"
style="
flex:1;
background:#ef4444;
height:46px;
"
>
Reject Banding
</button>

</div>


<button
onclick="closeAppealDetailModal()"
style="
margin-top:14px;
width:100%;
height:44px;
border:none;
border-radius:12px;
"
>
Tutup
</button>

</div>
</div>
  
<script src="./js/pages/admin.js?v=10001"></script>

</body>

</html>
