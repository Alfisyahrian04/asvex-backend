<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Seller Profile
</title>

<link
rel="stylesheet"
href="css/seller.css?v=10"
>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
>

</head>

<body>

<header class="topbar">

<div class="seller-logo">
AL SELLER
</div>

<div class="seller-name">
AKUN
</div>

</header>

<main class="container profile-page">

<div class="profile-card">

<div class="profile-label">
SELLER PROFILE
</div>

<div
class="profile-name"
id="profile-username"
>
Seller
</div>

<div class="profile-email-title">
EMAIL
</div>

<div
class="profile-email"
id="profile-email"
>
-
</div>

</div>

<div class="password-section">

<div class="password-title">
Ganti Password
</div>

<div class="password-form">

<input
class="password-input"
type="password"
id="old-password"
placeholder="Password Lama"
>

<input
class="password-input"
type="password"
id="new-password"
placeholder="Password Baru"
>

<input
class="password-input"
type="password"
id="confirm-password"
placeholder="Konfirmasi Password Baru"
>

<button
class="password-btn"
id="change-password-btn"
>

Simpan Password

</button>

</div>

<button
class="logout-btn"
id="logout-btn"
>

Logout

</button>

</div>

</main>

<nav class="bottom-nav">

<a
href="seller.html"
class="nav-item"
>

<i class="fa-solid fa-wallet"></i>

<span>
Saldo
</span>

</a>

<a
href="seller-products.html"
class="nav-item"
>

<i class="fa-solid fa-box"></i>

<span>
Produk
</span>

</a>

<a
href="seller-chat.html"
class="nav-item"
>

<i class="fa-solid fa-comments"></i>

<span>
Inbox
</span>

</a>

<a
href="seller-profile.html"
class="nav-item active"
>

<i class="fa-solid fa-user-gear"></i>

<span>
Akun
</span>

</a>

</nav>

<script src="js/pages/seller-profile.js"></script>

</body>
</html>
