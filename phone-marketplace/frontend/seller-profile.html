<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Seller Profile
</title>

<link
rel="stylesheet"
href="css/style.css"
>

<link
rel="stylesheet"
href="css/seller.css"
>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
>

</head>

<body>

<header class="topbar">

<div class="seller-logo">
AL SELLER
</div>

<div class="seller-name">
AKUN
</div>

</header>

<main class="container">

<div class="dashboard-card">

<p>
SELLER PROFILE
</p>

<h1 id="profile-username">
Seller
</h1>

<div class="dashboard-bottom">

<div class="dashboard-item">

<h3>
EMAIL
</h3>

<p id="profile-email">
-
</p>

</div>

</div>

</div>

<div class="section-title">

<div class="line"></div>

<h2>
Ganti Password
</h2>

</div>

<div class="password-form">

<input
type="password"
id="old-password"
placeholder="Password Lama"
>

<input
type="password"
id="new-password"
placeholder="Password Baru"
>

<input
type="password"
id="confirm-password"
placeholder="Konfirmasi Password Baru"
>

<button
class="save-password-btn"
onclick="changePassword()"
>

Simpan Password

</button>

</div>

<button
class="logout-btn"
onclick="logout()"
>

Logout

</button>

</main>

<nav class="bottom-nav">

<a
href="seller.html"
class="nav-item"
>

<i class="fa-solid fa-wallet"></i>

<span>
Saldo
</span>

</a>

<a
href="seller-products.html"
class="nav-item"
>

<i class="fa-solid fa-box"></i>

<span>
Produk
</span>

</a>

<a
href="seller-chat.html"
class="nav-item"
>

<i class="fa-solid fa-comments"></i>

<span>
Inbox
</span>

</a>

<a
href="seller-profile.html"
class="nav-item active"
>

<i class="fa-solid fa-user-gear"></i>

<span>
Akun
</span>

</a>

</nav>

<script src="js/pages/seller-profile.js"></script>

</body>
</html>
