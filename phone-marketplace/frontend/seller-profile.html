<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Seller Profile
</title>

<link
rel="stylesheet"
href="css/style.css"
>

<link
rel="stylesheet"
href="css/seller.css"
>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
>

</head>

<body>

<header class="topbar">

<div class="seller-logo">
AL SELLER
</div>

</header>

<main class="container">

<div class="section-title">

<div class="line"></div>

<h2>
Profile Seller
</h2>

</div>

<div class="wallet-card">

<h2 id="profile-username">
Seller
</h2>

<p id="profile-email">
seller@gmail.com
</p>

<button
onclick="logout()"
class="logout-btn"
>

Logout

</button>

</div>

</main>

<nav class="bottom-nav">

<a
href="seller.html"
class="nav-item"
>

<i class="fa-solid fa-wallet"></i>

<span>
Saldo
</span>

</a>

<a
href="seller-products.html"
class="nav-item"
>

<i class="fa-solid fa-box"></i>

<span>
Produk
</span>

</a>

<a
href="seller-chat.html"
class="nav-item"
>

<i class="fa-solid fa-comments"></i>

<span>
Inbox
</span>

</a>

<a
href="seller-profile.html"
class="nav-item active"
>

<i class="fa-solid fa-user-gear"></i>

<span>
Akun
</span>

</a>

</nav>

<script>

const user =
JSON.parse(
localStorage.getItem(
'user'
)
);

if(user){

document.getElementById(
'profile-username'
).innerText =
user.username;

document.getElementById(
'profile-email'
).innerText =
user.email;

}

function logout(){

localStorage.removeItem(
'user'
);

localStorage.removeItem(
'token'
);

window.location.href =
'login.html';

}

</script>

</body>
</html>
