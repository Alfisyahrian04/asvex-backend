<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Register
</title>

<link
rel="stylesheet"
href="css/style.css"
/>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

</head>

<body>

<div class="auth-container">

<div class="auth-card">

<div class="auth-logo">
AL
</div>

<h1>
Create Account
</h1>

<p>
Register akun baru
</p>

<form id="registerForm">

<div class="input-group">

<i class="fa-solid fa-user"></i>

<input
type="text"
id="username"
placeholder="Username"
required
/>

</div>

<div class="input-group">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Email"
required
/>

</div>

<div class="input-group">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
placeholder="Password"
required
/>

</div>

<div class="input-group">

<i class="fa-solid fa-users"></i>

<select id="role">

<option value="buyer">
Buyer
</option>

<option value="seller">
Seller
</option>

<option value="customer_service">
Customer Service
</option>

<option value="admin">
Admin
</option>

</select>

</div>

<div
class="input-group"
id="adminKeyContainer"
style="display:none;"
>

<i class="fa-solid fa-key"></i>

<input
type="password"
id="adminKey"
placeholder="Admin Secret Key"
/>

</div>

<button
type="submit"
class="auth-btn"
>
Register
</button>

</form>

<p class="auth-link">

Sudah punya akun?

<a href="login.html">
Login
</a>

</p>

</div>

</div>

<script>

const roleSelect =
document.getElementById(
'role'
);

const adminKeyContainer =
document.getElementById(
'adminKeyContainer'
);

function toggleAdminKeyField(){

if(
roleSelect.value === 'admin'
){
adminKeyContainer.style.display = 'flex';
}else{
adminKeyContainer.style.display = 'none';
}

}

roleSelect.addEventListener(
'change',
toggleAdminKeyField
);

toggleAdminKeyField();

</script>

<script src="js/pages/register.js"></script>

</body>
</html>
