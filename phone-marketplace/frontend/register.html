<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Register</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body
class="bg-gray-100 flex justify-center items-center min-h-screen">

  <div
    class="bg-white p-8 rounded-3xl shadow-lg w-full max-w-md"
  >

    <h1
      class="text-3xl font-bold mb-6"
    >
      Register
    </h1>

    <form id="registerForm">

      <input
        type="text"
        id="username"
        placeholder="Username"
        class="w-full border p-4 rounded-2xl mb-4"
      >

      <input
        type="email"
        id="email"
        placeholder="Email"
        class="w-full border p-4 rounded-2xl mb-4"
      >

      <input
        type="password"
        id="password"
        placeholder="Password"
        class="w-full border p-4 rounded-2xl mb-4"
      >

      <button
        class="w-full bg-green-500 text-white p-4 rounded-2xl"
      >
        Register
      </button>

    </form>

  </div>

  <script
    type="module"
    src="./js/pages/register.js"
  ></script>

</body>

</html>
