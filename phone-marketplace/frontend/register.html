<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Register - AL Gadget</title>

  <link
    rel="stylesheet"
    href="style.css"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

</head>

<body>

  <div class="auth-page">

    <div class="auth-card">

      <div class="auth-logo">
        AL
      </div>

      <h1>
        Create Account
      </h1>

      <p>
        Register akun baru
      </p>

      <form id="registerForm">

        <div class="input-group">

          <i class="fa-solid fa-user"></i>

          <input
            type="text"
            id="username"
            placeholder="Username"
            required
          />

        </div>

        <div class="input-group">

          <i class="fa-solid fa-envelope"></i>

          <input
            type="email"
            id="email"
            placeholder="Email"
            required
          />

        </div>

        <div class="input-group">

          <i class="fa-solid fa-lock"></i>

          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          />

        </div>

        <div class="input-group">

          <i class="fa-solid fa-users"></i>

          <select id="role">

            <option value="buyer">
              Buyer
            </option>

            <option value="seller">
              Seller
            </option>

            <option value="admin">
              Admin
            </option>

          </select>

        </div>

        <div
          class="input-group"
          id="adminKeyWrap"
          style="display:none;"
        >

          <i class="fa-solid fa-key"></i>

          <input
            type="password"
            id="adminKey"
            placeholder="Admin Secret Key"
          />

        </div>

        <button
          type="submit"
          class="btn-primary"
        >
          Register
        </button>

      </form>

      <div class="auth-links">

        <a href="login.html">
          Sudah punya akun?
        </a>

      </div>

    </div>

  </div>

  <script>

    const roleSelect =
    document.getElementById(
      'role'
    );

    const adminKeyWrap =
    document.getElementById(
      'adminKeyWrap'
    );

    roleSelect.addEventListener(
      'change',
      ()=>{

        if(
          roleSelect.value ===
          'admin'
        ){

          adminKeyWrap.style.display =
          'flex';

        }else{

          adminKeyWrap.style.display =
          'none';

        }

      }
    );

    const registerForm =
    document.getElementById(
      'registerForm'
    );

    registerForm.addEventListener(
      'submit',
      async (e)=>{

        e.preventDefault();

        const username =
        document.getElementById(
          'username'
        ).value;

        const email =
        document.getElementById(
          'email'
        ).value;

        const password =
        document.getElementById(
          'password'
        ).value;

        const role =
        document.getElementById(
          'role'
        ).value;

        const adminKey =
        document.getElementById(
          'adminKey'
        ).value;

        if(
          role === 'admin' &&
          adminKey !==
          'AL-GADGET-ADMIN-2026'
        ){

          alert(
            'Admin key salah'
          );

          return;

        }

        try{

          const res =
          await fetch(
            'https://BACKENDLU/api/auth/register',
            {
              method:'POST',
              headers:{
                'Content-Type':
                'application/json'
              },
              body:JSON.stringify({
                username,
                email,
                password,
                role
              })
            }
          );

          const data =
          await res.json();

          if(!res.ok){

            alert(
              data.message
            );

            return;

          }

          alert(
            'Register berhasil'
          );

          window.location.href =
          'login.html';

        }catch(err){

          console.log(err);

        }

      }
    );

  </script>

</body>
</html>
