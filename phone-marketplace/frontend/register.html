<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Register
  </title>

  <link
    rel="stylesheet"
    href="./css/style.css"
  />

</head>

<body>

  <div class="auth-container">

    <form id="register-form">

      <h1>
        Register
      </h1>

      <input
        type="text"
        id="name"
        placeholder="Nama"
        required
      />

      <input
        type="email"
        id="email"
        placeholder="Email"
        required
      />

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
      />

      <button
        type="submit"
        class="btn-primary"
      >

        Register

      </button>

      <p>

        Sudah punya akun?

        <a href="./login.html">
          Login
        </a>

      </p>

    </form>

  </div>

  <script
    type="module"
    src="./js/pages/register.js"
  ></script>

</body>

</html>
