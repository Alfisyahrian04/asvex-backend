<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Keranjang
</title>

<link
rel="stylesheet"
href="css/style.css?v=1000"
/>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

</head>

<body>

<header class="topbar">

<h1 class="page-title">
Keranjang
</h1>

</header>

<main class="container">

<div
class="cart-list"
id="cart-container"
>

</div>

</main>

<div class="checkout-bar">

<p>Total</p>

<h2 id="total-price">
Rp 0
</h2>

<button
class="checkout-btn"
id="checkout-btn"
>

<i class="fa-solid fa-bag-shopping"></i>

Checkout

</button>

</div>

<nav class="bottom-nav">

<a
href="index.html"
class="nav-item"
>

<i class="fa-solid fa-house"></i>

<span>
Home
</span>

</a>

<a
href="wishlist.html"
class="nav-item"
>

<i class="fa-solid fa-heart"></i>

<span>
Wishlist
</span>

</a>

<a
href="orders.html"
class="nav-item"
>

<i class="fa-solid fa-receipt"></i>

<span>
Transaksi
</span>

</a>

<a
href="profile.html"
class="nav-item active"
>

<i class="fa-solid fa-user"></i>

<span>
Akun
</span>

</a>

</nav>

<script src="js/utils/auth.js"></script>

<script src="js/store/cartStore.js"></script>

<script src="js/api/orderApi.js"></script>

<script>

protectPage();

const cartContainer =
document.getElementById(
'cart-container'
);

const totalPrice =
document.getElementById(
'total-price'
);

const checkoutBtn =
document.getElementById(
'checkout-btn'
);

function renderCart(){

const cart =
cartStore.getCart();

if(!cart.length){

cartContainer.innerHTML = `

<div class="empty-cart">

Keranjang kosong

</div>

`;

totalPrice.innerText =
'Rp 0';

return;

}

cartContainer.innerHTML =
cart.map(item=>`

<div class="cart-card">

<img
src="${
item.images?.[0] ||
item.image ||
'https://via.placeholder.com/300x300'
}"
alt="${item.name}"
/>

<div class="cart-info">

<h3>
${item.name}
</h3>

<p>
Rp ${Number(item.price || 0)
.toLocaleString('id-ID')}
</p>

<div class="qty-box">

<button
onclick="decreaseQty('${item._id}')"
>

-

</button>

<span>
${item.quantity || 1}
</span>

<button
onclick="increaseQty('${item._id}')"
>

+

</button>

</div>

<button
class="remove-btn"
onclick="removeItem('${item._id}')"
>

<i class="fa-solid fa-trash"></i>

Hapus

</button>

</div>

</div>

`).join('');

totalPrice.innerText =
`Rp ${cartStore
.getCartTotal()
.toLocaleString('id-ID')}`;

}

/* REMOVE */

function removeItem(productId){

cartStore.removeFromCart(
productId
);

renderCart();

}

/* INCREASE */

function increaseQty(productId){

const cart =
cartStore.getCart();

const product =
cart.find(
item =>
item._id === productId
);

if(product){

product.quantity =
(product.quantity || 1) + 1;

}

localStorage.setItem(
'cart',
JSON.stringify(cart)
);

renderCart();

}

/* DECREASE */

function decreaseQty(productId){

const cart =
cartStore.getCart();

const product =
cart.find(
item =>
item._id === productId
);

if(
product &&
product.quantity > 1
){

product.quantity--;

}

localStorage.setItem(
'cart',
JSON.stringify(cart)
);

renderCart();

}

/* CHECKOUT */

if(
checkoutBtn
){

checkoutBtn.addEventListener(
'click',
async()=>{

try{

const cart =
cartStore.getCart();

if(!cart.length){

alert(
'Keranjang kosong'
);

return;

}

checkoutBtn.disabled =
true;

checkoutBtn.innerText =
'Processing...';

for(const item of cart){

await createOrder({

productId:item._id,

quantity:item.quantity || 1,

shippingAddress:
'Indonesia'

});

}

cartStore.clearCart();

alert(
'Checkout berhasil'
);

window.location.href =
'orders.html';

}catch(error){

console.log(error);

alert(
'Checkout gagal'
);

}

checkoutBtn.disabled =
false;

checkoutBtn.innerHTML =

`
<i class="fa-solid fa-bag-shopping"></i>
Checkout
`;

}
);

}

renderCart();

</script>

</body>
</html>
