<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Keranjang
  </title>

  <link
    rel="stylesheet"
    href="./css/style.css"
  />

</head>

<body>

  <header class="topbar">

    <div class="logo">
      Keranjang
    </div>

  </header>

  <main class="container">

    <div
      id="cart-items"
      class="cart-list"
    ></div>

    <div class="checkout-bar">

      <div>

        <small>Total</small>

        <h2 id="cart-total">
          Rp 0
        </h2>

      </div>

      <button
        id="checkout-btn"
        class="btn-primary"
      >

        Checkout

      </button>

    </div>

  </main>

  <script
    type="module"
    src="./js/pages/cart.js"
  ></script>
<nav class="bottom-nav">

  <div
    class="nav-item"
    onclick="
      window.location.href=
      'index.html'
    "
  >

    <i class="fa fa-home"></i>

    <span>Home</span>

  </div>

  <div
    class="nav-item"
    onclick="
      window.location.href=
      'wishlist.html'
    "
  >

    <i class="fa fa-heart"></i>

    <span>Wishlist</span>

  </div>

  <div class="nav-item active">

    <i class="fa fa-shopping-cart"></i>

    <span>Cart</span>

  </div>

  <div
    class="nav-item"
    onclick="
      window.location.href=
      'profile.html'
    "
  >

    <i class="fa fa-user"></i>

    <span>Profile</span>

  </div>

</nav>
</body>

</html>
