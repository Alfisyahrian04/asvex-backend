<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Keranjang
</title>

<link
rel="stylesheet"
href="css/style.css"
/>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

</head>

<body>

<header class="topbar">

<h1 class="page-title">
Keranjang
</h1>

</header>

<main class="container">

<div
class="cart-list"
id="cart-container"
>

</div>

</main>

<div class="checkout-bar">

<p>Total</p>

<h2 id="total-price">
Rp 0
</h2>

<button
class="checkout-btn"
onclick="checkout()"
>

<i class="fa-solid fa-bag-shopping"></i>

Checkout

</button>

</div>

<nav class="bottom-nav">

<a
href="index.html"
class="nav-item"
>

<i class="fa-solid fa-house"></i>

<span>
Home
</span>

</a>

<a
href="wishlist.html"
class="nav-item"
>

<i class="fa-solid fa-heart"></i>

<span>
Wishlist
</span>

</a>

<a
href="orders.html"
class="nav-item"
>

<i class="fa-solid fa-receipt"></i>

<span>
Transaksi
</span>

</a>

<a
href="profile.html"
class="nav-item active"
>

<i class="fa-solid fa-user"></i>

<span>
Akun
</span>

</a>

</nav>

<script src="js/utils/auth.js"></script>

<script src="js/store/cartStore.js"></script>

<script src="js/api/orderApi.js"></script>

<script>

protectPage();

const cartContainer =
document.getElementById(
'cart-container'
);

const totalPrice =
document.getElementById(
'total-price'
);

function renderCart(){

const cart =
cartStore.getCart();

if(!cart.length){

cartContainer.innerHTML = `

<div class="empty-cart">

Keranjang kosong

</div>

`;

totalPrice.innerText =
'Rp 0';

return;

}

cartContainer.innerHTML =
cart.map(item=>`

<div class="cart-card">

<img
src="${
item.images?.[0] ||
item.image
}"
alt="${item.name}"
/>

<div class="cart-info">

<h3>
${item.name}
</h3>

<p>
Rp ${Number(item.price)
.toLocaleString('id-ID')}
</p>

<p>
Qty: ${item.quantity}
</p>

<button
class="remove-btn"
onclick="removeItem('${item._id}')"
>

<i class="fa-solid fa-trash"></i>

Hapus

</button>

</div>

</div>

`).join('');

totalPrice.innerText =
`Rp ${cartStore
.getCartTotal()
.toLocaleString('id-ID')}`;

}

function removeItem(productId){

cartStore.removeFromCart(
productId
);

renderCart();

}

async function checkout(){

try{

const cart =
cartStore.getCart();

if(!cart.length){

alert(
'Keranjang kosong'
);

return;

}

for(const item of cart){

await createOrder({

productId:item._id,

quantity:item.quantity,

shippingAddress:
'Indonesia'

});

}

cartStore.clearCart();

alert(
'Checkout berhasil'
);

window.location.href =
'orders.html';

}catch(error){

alert(
'Checkout gagal'
);

}

}

renderCart();

</script>

</body>
</html>
