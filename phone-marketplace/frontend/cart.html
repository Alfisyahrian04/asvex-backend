<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Keranjang
</title>

<link
rel="stylesheet"
href="css/style.css"
/>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

</head>

<body>

<header class="topbar">

<h1 style="font-size:2.3rem;font-weight:900;color:#2563eb;font-style:italic;">
Keranjang
</h1>

</header>

<main class="container">

<div
class="cart-list"
id="cart-container"
>

</div>

</main>

<div class="checkout-bar">

<p>Total</p>

<h2 id="total-price">
Rp 0
</h2>

<button
class="checkout-btn"
onclick="checkout()"
>

<i class="fa-solid fa-bag-shopping"></i>
Checkout

</button>

</div>

<nav class="bottom-nav">

<a
href="index.html"
class="nav-item"
>

<i class="fa-solid fa-house"></i>

<span>
Home
</span>

</a>

<a
href="wishlist.html"
class="nav-item"
>

<i class="fa-solid fa-heart"></i>

<span>
Wishlist
</span>

</a>

<a
href="orders.html"
class="nav-item"
>

<i class="fa-solid fa-receipt"></i>

<span>
Transaksi
</span>

</a>

<a
href="profile.html"
class="nav-item active"
>

<i class="fa-solid fa-user"></i>

<span>
Akun
</span>

</a>

</nav>

<script>

let cart =
JSON.parse(
localStorage.getItem('cart')
) || [];

const cartContainer =
document.getElementById(
'cart-container'
);

const totalPrice =
document.getElementById(
'total-price'
);

/* HAPUS DUMMY */

cart = cart.filter(
item =>
item.name &&
item.price &&
item.image
);

localStorage.setItem(
'cart',
JSON.stringify(cart)
);

function renderCart(){

if(!cart.length){

cartContainer.innerHTML = `
<div class="empty-cart">
Keranjang kosong
</div>
`;

totalPrice.innerText =
'Rp 0';

return;

}

cartContainer.innerHTML =
cart.map((item,index)=>`

<div class="cart-card">

<img
src="${item.image}"
alt="${item.name}"
/>

<div class="cart-info">

<h3>
${item.name}
</h3>

<p>
Rp ${Number(item.price)
.toLocaleString('id-ID')}
</p>

<button
class="remove-btn"
onclick="removeItem(${index})"
>

Hapus

</button>

</div>

</div>

`).join('');

const total =
cart.reduce(
(acc,item)=>
acc + Number(item.price),
0
);

totalPrice.innerText =
`Rp ${total.toLocaleString('id-ID')}`;

}

function removeItem(index){

cart.splice(index,1);

localStorage.setItem(
'cart',
JSON.stringify(cart)
);

renderCart();

}

function checkout(){

if(!cart.length){

alert(
'Keranjang kosong'
);

return;

}

let orders =
JSON.parse(
localStorage.getItem('orders')
) || [];

orders.push(...cart);

localStorage.setItem(
'orders',
JSON.stringify(orders)
);

localStorage.removeItem(
'cart'
);

cart = [];

renderCart();

alert(
'Checkout berhasil'
);

window.location.href =
'orders.html';

}

renderCart();

</script>

</body>
</html>
