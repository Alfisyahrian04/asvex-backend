<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Keranjang - AL Gadget
  </title>

  <!-- FONT AWESOME -->

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <!-- CSS -->

  <link
    rel="stylesheet"
    href="./css/style.css"
  />

</head>

<body>

  <!-- TOPBAR -->

  <div class="topbar">

    <div class="logo">
      Keranjang
    </div>

  </div>

  <!-- CONTENT -->

  <div class="container">

    <div
      class="cart-list"
      id="cart-items"
    >

      <!-- ITEM -->

      <div class="cart-card">

        <img
          src="https://images.unsplash.com/photo-1598327105666-5b89351aff97?q=80&w=800&auto=format&fit=crop"
          alt=""
        />

        <div class="cart-info">

          <div>

            <h3 class="cart-title">
              iPhone 17 Pro Max
            </h3>

            <p class="cart-price">
              Rp 20.000.000
            </p>

          </div>

          <button class="remove-btn">

            <i class="fa-solid fa-trash"></i>

            Hapus

          </button>

        </div>

      </div>

      <!-- ITEM -->

      <div class="cart-card">

        <img
          src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=800&auto=format&fit=crop"
          alt=""
        />

        <div class="cart-info">

          <div>

            <h3 class="cart-title">
              iPhone 17 Pro Max
            </h3>

            <p class="cart-price">
              Rp 34.749.000
            </p>

          </div>

          <button class="remove-btn">

            <i class="fa-solid fa-trash"></i>

            Hapus

          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- CHECKOUT -->

  <div class="checkout-bar">

    <div class="checkout-total">

      <span>Total</span>

      <h2 id="cart-total">
        Rp 54.749.000
      </h2>

    </div>

    <button
      class="checkout-btn"
      id="checkout-btn"
    >

      <i class="fa-solid fa-bag-shopping"></i>

      Checkout

    </button>

  </div>

  <!-- FLOAT NAVIGATION -->

  <div class="bottom-nav">

    <a
      href="index.html"
      class="nav-item"
    >

      <i class="fa-solid fa-house"></i>

      <span>HOME</span>

    </a>

    <a
      href="wishlist.html"
      class="nav-item"
    >

      <i class="fa-solid fa-heart"></i>

      <span>WISHLIST</span>

    </a>

    <a
      href="transaction.html"
      class="nav-item"
    >

      <i class="fa-solid fa-receipt"></i>

      <span>TRANSAKSI</span>

    </a>

    <a
      href="profile.html"
      class="nav-item active"
    >

      <i class="fa-solid fa-user"></i>

      <span>AKUN</span>

    </a>

  </div>

  <!-- JS -->

  <script
    type="module"
    src="./js/pages/cart.js"
  ></script>

</body>

</html>
