<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seller Dashboard</title>

<link rel="stylesheet" href="css/seller.css?v=99999">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>
</head>

<body>

<header class="topbar">
<div class="seller-logo">AL SELLER</div>
<div class="seller-name" id="seller-username">SELLER</div>
</header>

<main class="container">

<div class="dashboard-card">
<p>SELLER DASHBOARD</p>

<h1 id="seller-balance">RP 0</h1>

<div class="dashboard-bottom">
<div class="dashboard-item">
<h3>BULAN INI</h3>
<p id="monthly-income">RP 0</p>
</div>

<div class="dashboard-item">
<h3>TOTAL ORDER</h3>
<p id="total-orders">0 UNIT</p>
</div>
</div>
</div>

<div class="section-title">
<div class="line"></div>
<h2>Pesanan Perlu Diproses</h2>
</div>

<div
id="pending-orders"
class="seller-product-grid"
>
<div class="empty-state">
Belum ada pesanan
</div>
</div>

</main>



<!-- REFUND DETAIL MODAL -->

<div
id="refund-detail-modal"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
z-index:99999;
padding:20px;
overflow:auto;
"
>

<div class="refund-detail-content">

<h2
style="
font-size:20px;
font-weight:700;
margin-bottom:14px;
"
>
Pengajuan Refund Buyer
</h2>

<p
id="refund-detail-reason"
style="
font-size:14px;
line-height:1.7;
color:#374151;
"
></p>

<video
id="refund-detail-video"
controls
style="
width:100%;
margin-top:14px;
border-radius:14px;
display:none;
"
></video>

<textarea
id="seller-return-address"
placeholder="Input alamat retur seller"
></textarea>

<button
id="approve-refund-btn"
style="
margin-top:14px;
width:100%;
height:52px;
border:none;
border-radius:16px;
background:#16a34a;
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
"
>
Setujui Refund & Kirim Alamat Retur
</button>

<button
id="reject-refund-btn"
style="
margin-top:12px;
width:100%;
height:52px;
border:none;
border-radius:16px;
background:#ef4444;
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
"
>
Tolak Refund
</button>

<button
onclick="closeRefundDetailModal()"
style="
margin-top:10px;
width:100%;
height:48px;
border:none;
border-radius:14px;
background:#f3f4f6;
font-weight:600;
cursor:pointer;
"
>
Tutup
</button>

</div>
</div>



<!-- SELLER APPEAL MODAL -->

<div
id="seller-appeal-modal"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
z-index:99999;
padding:16px;
overflow-y:auto;
box-sizing:border-box;
"
>

<div
style="
background:#fff;
width:calc(100% - 32px);
max-width:380px;
margin:32px auto;
border-radius:24px;
padding:22px;
box-sizing:border-box;
position:relative;
z-index:100000;
"
>

<h3
style="
font-size:18px;
font-weight:700;
margin-bottom:14px;
"
>
Ajukan Banding ke Admin
</h3>

<textarea
id="seller-appeal-reason"
placeholder="Masukkan alasan banding"
style="
width:100%;
height:110px;
padding:14px;
border-radius:14px;
border:1px solid #e5e7eb;
resize:none;
font-size:14px;
box-sizing:border-box;
"
></textarea>

<div style="margin-top:14px;">

<label
for="seller-appeal-photo"
style="
display:block;
font-size:14px;
font-weight:600;
margin-bottom:8px;
color:#374151;
"
>
📸 Upload Foto Bukti
</label>

<input
type="file"
accept="image/*"
id="seller-appeal-photo"
style="
width:100%;
display:block;
padding:14px;
background:#f9fafb;
border:1px solid #e5e7eb;
border-radius:14px;
box-sizing:border-box;
font-size:15px;
cursor:pointer;
"
/>

</div>


<div style="margin-top:14px;">

<label
for="seller-appeal-video"
style="
display:block;
font-size:14px;
font-weight:600;
margin-bottom:8px;
color:#374151;
"
>
🎥 Upload Video Bukti
</label>

<input
type="file"
accept="video/*"
id="seller-appeal-video"
style="
width:100%;
display:block;
padding:14px;
background:#f9fafb;
border:1px solid #e5e7eb;
border-radius:14px;
box-sizing:border-box;
font-size:15px;
cursor:pointer;
"
/>

</div>

<button
type="button"
onclick="submitSellerAppealForm()"
style="
width:100%;
height:52px;
margin-top:18px;
border:none;
border-radius:16px;
background:#ff6b00;
color:white;
font-size:18px;
font-weight:700;
cursor:pointer;
"
>
Kirim Banding
</button>

<button
type="button"
onclick="closeSellerAppealModal()"
style="
width:100%;
height:46px;
margin-top:10px;
border:none;
border-radius:14px;
background:#f3f4f6;
font-weight:600;
cursor:pointer;
"
>
Batal
</button>

</div>
</div>



<nav class="bottom-nav">

<a href="seller.html" class="nav-item active">
<i class="fa-solid fa-wallet"></i>
<span>Saldo</span>
</a>

<a href="seller-products.html" class="nav-item">
<i class="fa-solid fa-box"></i>
<span>Produk</span>
</a>

<a href="seller-chat.html" class="nav-item">
<i class="fa-solid fa-comments"></i>
<span>Inbox</span>
</a>

<a href="seller-profile.html" class="nav-item">
<i class="fa-solid fa-user-gear"></i>
<span>Akun</span>
</a>

</nav>

<script src="js/pages/seller.js?v=99999"></script>

</body>
</html>
