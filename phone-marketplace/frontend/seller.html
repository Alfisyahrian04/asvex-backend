<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Seller Dashboard
</title>

<link
rel="stylesheet"
href="css/seller.css?v=99999"
>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
>

</head>

<body>

<header class="topbar">

<div class="seller-logo">
AL SELLER
</div>

<div
class="seller-name"
id="seller-username"
>
SELLER
</div>

</header>

<main class="container">

<div class="dashboard-card">

<p>
SELLER DASHBOARD
</p>

<h1 id="seller-balance">
RP 0
</h1>

<div class="dashboard-bottom">

<div class="dashboard-item">

<h3>
BULAN INI
</h3>

<p id="monthly-income">
RP 0
</p>

</div>

<div class="dashboard-item">

<h3>
TOTAL ORDER
</h3>

<p id="total-orders">
0 UNIT
</p>

</div>

</div>

</div>

<div class="section-title">

<div class="line"></div>

<h2>
Pesanan Perlu Diproses
</h2>

</div>

<div
id="pending-orders"
class="seller-product-grid"
>

<div class="empty-state">
Belum ada pesanan
</div>

</div>

</main>


<!-- REFUND DETAIL MODAL PATCH -->

<div
id="refund-detail-modal"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.55);
z-index:99999;
padding:20px;
overflow:auto;
"
>

<div
style="
background:#fff;
max-width:520px;
margin:40px auto;
border-radius:22px;
padding:22px;
"
>

<h2
style="
font-size:20px;
font-weight:700;
margin-bottom:14px;
"
>
Pengajuan Refund Buyer
</h2>

<p
id="refund-detail-reason"
style="
font-size:14px;
line-height:1.7;
color:#374151;
"
></p>

<video
id="refund-detail-video"
controls
style="
width:100%;
margin-top:14px;
border-radius:14px;
display:none;
"
></video>

<textarea
id="seller-return-address"
placeholder="Input alamat retur seller"
style="
width:100%;
min-height:110px;
margin-top:16px;
padding:14px;
border-radius:14px;
border:1px solid #e5e7eb;
resize:none;
"
></textarea>

<button
id="approve-refund-btn"
style="
margin-top:14px;
width:100%;
height:52px;
border:none;
border-radius:16px;
background:#16a34a;
color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
"
>
Setujui Refund & Kirim Alamat Retur
</button>

<button
onclick="closeRefundDetailModal()"
style="
margin-top:10px;
width:100%;
height:48px;
border:none;
border-radius:14px;
background:#f3f4f6;
font-weight:600;
cursor:pointer;
"
>
Tutup
</button>

</div>

</div>


<nav class="bottom-nav">

<a
href="seller.html"
class="nav-item active"
>
<i class="fa-solid fa-wallet"></i>
<span>Saldo</span>
</a>

<a
href="seller-products.html"
class="nav-item"
>
<i class="fa-solid fa-box"></i>
<span>Produk</span>
</a>

<a
href="seller-chat.html"
class="nav-item"
>
<i class="fa-solid fa-comments"></i>
<span>Inbox</span>
</a>

<a
href="seller-profile.html"
class="nav-item"
>
<i class="fa-solid fa-user-gear"></i>
<span>Akun</span>
</a>

</nav>

<script src="js/pages/seller.js?v=99999"></script>

</body>
</html>
