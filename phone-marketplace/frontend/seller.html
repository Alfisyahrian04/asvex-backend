<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Seller Dashboard
</title>

<link
rel="stylesheet"
href="css/style.css"
>

<link
rel="stylesheet"
href="css/seller.css"
>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
>

</head>

<body>

<header class="topbar">

<div class="seller-logo">
AL SELLER
</div>

<div class="seller-name">

<span id="seller-username">
SELLER
</span>

</div>

</header>

<main class="container">

<div class="dashboard-card">

<p>
PENDAPATAN HARI INI
</p>

<h1 id="wallet-balance">
Rp 0
</h1>

<div class="dashboard-bottom">

<div class="dashboard-item">

<h3>
BULAN INI
</h3>

<p id="monthly-revenue">
RP0
</p>

</div>

<div class="dashboard-item">

<h3>
TOTAL ORDER
</h3>

<p id="total-orders">
0
</p>

</div>

</div>

</div>

<div class="section-title">

<div class="line"></div>

<h2>
Pesanan Perlu Diproses
</h2>

</div>

<div
id="pending-orders"
class="seller-product-grid"
>

<div class="empty-state">
Belum ada pesanan
</div>

</div>

<div class="section-title">

<div class="line"></div>

<h2>
Produk Saya
</h2>

</div>

<div
class="seller-product-grid"
id="seller-product-list"
>

<div class="empty-state">
Belum ada produk
</div>

</div>

</main>

<button
class="add-product-btn"
onclick="openProductModal()"
>

<i class="fa-solid fa-plus"></i>

</button>

<nav class="bottom-nav">

<a
href="seller.html"
class="nav-item active"
>

<i class="fa-solid fa-wallet"></i>

<span>
Saldo
</span>

</a>

<a
href="seller-products.html"
class="nav-item"
>

<i class="fa-solid fa-box"></i>

<span>
Produk
</span>

</a>

<a
href="seller-chat.html"
class="nav-item"
>

<i class="fa-solid fa-comments"></i>

<span>
Inbox
</span>

</a>

<a
href="seller-profile.html"
class="nav-item"
>

<i class="fa-solid fa-user-gear"></i>

<span>
Akun
</span>

</a>

</nav>

<div
class="modal"
id="product-modal"
>

<div class="modal-content">

<h2>
Tambah Produk
</h2>

<input
type="text"
id="product-name"
placeholder="Nama Produk"
>

<input
type="number"
id="product-price"
placeholder="Harga"
>

<input
type="number"
id="product-stock"
placeholder="Stock"
>

<input
type="text"
id="product-category"
placeholder="Kategori"
>

<input
type="text"
id="product-image"
placeholder="Image URL"
>

<textarea
id="product-description"
placeholder="Deskripsi"
></textarea>

<button
onclick="createProduct()"
>

Simpan Produk

</button>

</div>

</div>

<script src="js/utils/auth.js"></script>

<script src="js/store/authStore.js"></script>

<script src="js/api/productApi.js"></script>

<script src="js/pages/seller.js"></script>

</body>
</html>
