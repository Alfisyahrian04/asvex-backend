<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Seller Products</title>

<link rel="stylesheet" href="css/seller.css?v=100001"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>
<body>

<header class="topbar">
<div class="seller-logo">AL SELLER</div>
<div class="seller-name">PRODUK</div>
</header>

<main class="container">

<div class="section-title">
<div class="line"></div>
<h2>Daftar Produk</h2>
</div>

<div
class="seller-product-grid"
id="seller-product-list"
>
<div class="empty-state">
Belum ada produk
</div>
</div>

</main>

<button
type="button"
class="add-product-btn"
id="open-product-modal"
>
<i class="fa-solid fa-plus"></i>
</button>

<div class="modal" id="product-modal">

<div
class="modal-content"
style="
position:fixed;
top:72px;
left:0;
right:0;
margin:auto;
width:100%;
max-width:100%;
height:calc(100vh - 72px);
overflow-y:auto;
background:#fff;
padding:24px;
padding-bottom:180px;
border-radius:24px 24px 0 0;
box-sizing:border-box;
"
>

<h2 style="margin-top:0;margin-bottom:20px;">
Tambah Produk
</h2>

<input
type="text"
id="product-name"
placeholder="Nama Produk"
/>

<input
type="text"
id="product-brand"
placeholder="Brand Produk"
/>

<input
type="text"
id="product-main-variant"
placeholder="Variant Produk"
/>

<textarea
id="product-description"
placeholder="Deskripsi Produk"
></textarea>

<input
type="number"
id="product-price"
placeholder="Harga Produk"
/>

<input
type="number"
id="product-stock"
placeholder="Stok Produk"
/>

<select id="product-category">
<option value="">Pilih Kategori Produk</option>
<option value="Elektronik">Elektronik</option>
<option value="Make Up">Make Up</option>
<option value="Skincare">Skincare</option>
<option value="Fashion">Fashion</option>
<option value="Gaming">Gaming</option>
<option value="Aksesoris">Aksesoris</option>
<option value="Kesehatan">Kesehatan</option>
<option value="Rumah Tangga">Rumah Tangga</option>
<option value="Makanan">Makanan</option>
<option value="Minuman">Minuman</option>
<option value="Ibu & Bayi">Ibu & Bayi</option>
<option value="Olahraga">Olahraga</option>
<option value="Otomotif">Otomotif</option>
<option value="Lainnya">Lainnya</option>
</select>

<select id="product-condition">
<option value="Baru">Baru</option>
<option value="Bekas">Bekas</option>
</select>

<input
type="number"
id="product-weight"
placeholder="Berat (gram)"
/>

<input
type="text"
id="product-sku"
placeholder="SKU Produk"
/>

<label
style="
display:block;
margin-top:14px;
margin-bottom:8px;
font-weight:600;
"
>
Upload Foto Produk (Default)
</label>

<input
type="file"
id="product-image"
accept="image/*"
/>

<hr
style="
margin:24px 0;
border:none;
border-top:1px solid #eee;
"
/>

<details>

<summary
style="
cursor:pointer;
font-weight:700;
font-size:16px;
padding:10px 0;
"
>
Tambah Variant +
</summary>

<div style="margin-top:14px;">

<input
type="text"
id="variant-name"
placeholder="Nama Variant"
/>

<input
type="number"
id="variant-price"
placeholder="Harga Variant"
/>

<input
type="number"
id="variant-stock"
placeholder="Stock Variant"
/>

<label
style="
display:block;
margin-top:14px;
margin-bottom:8px;
font-weight:600;
"
>
Upload Foto Variant
</label>

<input
type="file"
id="variant-image"
accept="image/*"
/>

<button
type="button"
id="add-variant-btn"
style="margin-top:14px;"
>
+ Tambah Variant
</button>

<div id="variant-list"></div>

<label
style="
display:block;
margin-top:18px;
margin-bottom:8px;
font-weight:600;
"
>
Variant Utama Produk
</label>

<select id="primary-variant-select">
<option value="">
Pilih Variant Utama
</option>
</select>

</div>

</details>

<button
type="button"
id="save-product-btn"
style="
margin-top:20px;
margin-bottom:60px;
"
>
Upload Produk
</button>

</div>
</div>

<div
id="product-preview-modal"
style="
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#fff;
z-index:999999;
overflow-y:auto;
"
>

<div
id="close-product-preview"
style="
position:sticky;
top:0;
background:#fff;
padding:16px;
font-size:28px;
cursor:pointer;
z-index:2;
"
>
←
</div>

<div
id="product-preview-content"
style="
padding:16px;
padding-bottom:120px;
"
>
</div>

</div>

<nav class="bottom-nav">

<a href="seller.html" class="nav-item">
<i class="fa-solid fa-wallet"></i>
<span>Saldo</span>
</a>

<a href="seller-products.html" class="nav-item active">
<i class="fa-solid fa-box"></i>
<span>Produk</span>
</a>

<a href="seller-chat.html" class="nav-item">
<i class="fa-solid fa-comments"></i>
<span>Inbox</span>
</a>

<a href="seller-profile.html" class="nav-item">
<i class="fa-solid fa-user-gear"></i>
<span>Akun</span>
</a>

</nav>

<script src="js/pages/seller-products.js?v=100001"></script>

</body>
</html>
