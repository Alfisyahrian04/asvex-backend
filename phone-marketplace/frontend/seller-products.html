<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>
Seller Products
</title>

<link
rel="stylesheet"
href="css/style.css"
>

<link
rel="stylesheet"
href="css/seller.css?v=100000"
>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
>

</head>

<body>

<header class="topbar">

<div class="seller-logo">
AL SELLER
</div>

<div class="seller-name">
PRODUK
</div>

</header>

<main class="container">

<div class="section-title">

<div class="line"></div>

<h2>
Daftar Produk
</h2>

</div>

<div
class="seller-product-grid"
id="seller-product-list"
>

<div class="empty-state">
Belum ada produk
</div>

</div>

</main>

<!-- FLOATING ADD PRODUCT BUTTON -->

<button
type="button"
class="add-product-btn"
id="open-product-modal"
>

<i class="fa-solid fa-plus"></i>

</button>

<!-- PRODUCT MODAL -->

<div
class="modal"
id="product-modal"
>

<div class="modal-content">

<h2>
Tambah Produk
</h2>

<input
type="text"
id="product-name"
placeholder="Nama Produk"
>

<textarea
id="product-description"
placeholder="Deskripsi Produk"
></textarea>

<input
type="number"
id="product-price"
placeholder="Harga Produk"
>

<input
type="file"
id="product-image"
accept="image/*"
>

<button
type="button"
id="save-product-btn"
>

Upload Produk

</button>

</div>

</div>

<nav class="bottom-nav">

<a
href="seller.html"
class="nav-item"
>

<i class="fa-solid fa-wallet"></i>

<span>
Saldo
</span>

</a>

<a
href="seller-products.html"
class="nav-item active"
>

<i class="fa-solid fa-box"></i>

<span>
Produk
</span>

</a>

<a
href="seller-chat.html"
class="nav-item"
>

<i class="fa-solid fa-comments"></i>

<span>
Inbox
</span>

</a>

<a
href="seller-profile.html"
class="nav-item"
>

<i class="fa-solid fa-user-gear"></i>

<span>
Akun
</span>

</a>

</nav>

<script src="js/pages/seller-products.js?v=100000"></script>

</body>
</html>
