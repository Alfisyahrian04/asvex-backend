<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AL Gadget</title>

<link rel="stylesheet" href="style.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

</head>
<body>

<!-- TOPBAR -->
<header class="topbar">

  <div class="logo">
    AL
  </div>

  <div class="search-box">

    <i class="fa-solid fa-magnifying-glass"></i>

    <input
      type="text"
      id="searchInput"
      placeholder="Cari smartphone..."
    />

  </div>

  <a href="cart.html" class="cart-btn">

    <i class="fa-solid fa-cart-shopping"></i>

    <span id="cart-count">
      0
    </span>

  </a>

</header>

<!-- CONTAINER -->
<div class="container">

  <!-- HERO -->
  <section class="hero-banner">

    <div class="hero-overlay">

      <span class="hero-badge">
        APPLE PREMIUM
      </span>

      <h1>
        iPhone 17 Pro Max
      </h1>

      <p>
        Smartphone flagship dengan performa premium dan kamera terbaik.
      </p>

      <button class="hero-btn">
        Shop Now
      </button>

    </div>

    <img
      src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1200"
      alt="banner"
    >

  </section>

  <!-- WELCOME -->
  <section class="welcome-box">

    <h2>
      Hi,
      <span id="usernameText">
        User
      </span>
    </h2>

    <p>
      Temukan gadget favoritmu hari ini
    </p>

  </section>

  <!-- CATEGORY -->
  <div class="category-list">

    <button class="category active">
      Semua
    </button>

    <button class="category">
      iPhone
    </button>

    <button class="category">
      Samsung
    </button>

    <button class="category">
      Xiaomi
    </button>

    <button class="category">
      Gaming
    </button>

    <button class="category">
      Murah
    </button>

  </div>

  <!-- SECTION -->
  <div class="section-header">

    <h2>
      Flash Sale
    </h2>

    <a href="#">
      Lihat Semua
    </a>

  </div>

  <!-- PRODUCTS -->
  <div class="product-grid" id="productGrid">

  </div>

</div>

<!-- NAVBAR -->
<div class="bottom-nav">

  <a href="index.html" class="nav-item active">

    <i class="fa-solid fa-house"></i>

    <span>
      Home
    </span>

  </a>

  <a href="wishlist.html" class="nav-item">

    <i class="fa-solid fa-heart"></i>

    <span>
      Wishlist
    </span>

  </a>

  <a href="transactions.html" class="nav-item">

    <i class="fa-solid fa-receipt"></i>

    <span>
      Transaksi
    </span>

  </a>

  <a href="profile.html" class="nav-item">

    <i class="fa-solid fa-user"></i>

    <span>
      Akun
    </span>

  </a>

</div>

<script>

const BASE_URL =
'https://asvex-backend-production.up.railway.app/api';

const currentUser =
JSON.parse(localStorage.getItem('currentUser'));

if(!currentUser){

  window.location.href =
  'login.html';

}

document.getElementById('usernameText').innerText =
currentUser.username || 'User';

let cart =
JSON.parse(localStorage.getItem('cart')) || [];

document.getElementById('cart-count').innerText =
cart.length;

const productGrid =
document.getElementById('productGrid');

async function loadProducts(){

  try{

    const response =
    await fetch(`${BASE_URL}/products`);

    const products =
    await response.json();

    productGrid.innerHTML = '';

    products.forEach(product => {

      productGrid.innerHTML += `

      <div class="product-card">

        <div class="product-image">

          <img
            src="${product.image}"
            alt="${product.name}"
          >

        </div>

        <div class="product-info">

          <span class="product-category">
            ${product.category || 'SMARTPHONE'}
          </span>

          <h3 class="product-title">
            ${product.name}
          </h3>

          <div class="product-price">

            Rp ${Number(product.price).toLocaleString('id-ID')}

          </div>

          <div class="product-meta">

            <span>
              <i class="fa-solid fa-star"></i>
              ${product.rating || '4.8'}
            </span>

            <span>
              Terjual ${product.sold || '0'}
            </span>

          </div>

          <button
            class="btn-cart"
            onclick='addToCart(${JSON.stringify(product)})'
          >
            + Keranjang
          </button>

        </div>

      </div>

      `;

    });

  }catch(error){

    console.log(error);

  }

}

function addToCart(product){

  cart.push(product);

  localStorage.setItem(
    'cart',
    JSON.stringify(cart)
  );

  document.getElementById('cart-count').innerText =
  cart.length;

  alert('Produk ditambahkan ke keranjang');

}

loadProducts();

</script>

</body>
</html>
