<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8" />
<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>AL Gadget</title>

<link
rel="stylesheet"
href="css/style.css"
/>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>
</head>

<body>

<header class="topbar">

<div class="logo">
AL
</div>

<div class="search-box">
<i class="fa-solid fa-magnifying-glass"></i>
<input
type="text"
placeholder="Cari smartphone..."
/>
</div>

<a
href="cart.html"
class="cart-btn"
>
<i class="fa-solid fa-cart-shopping"></i>

<span id="cart-count">
0
</span>
</a>

</header>

<section class="hero-section">

<img
src="https://images.unsplash.com/photo-1592750475338-74b7b21085ab?q=80&w=1200"
alt=""
/>

<div class="hero-overlay">

<p>
PREMIUM SMARTPHONE
</p>

<h1>
Upgrade Gadget Terbaik
</h1>

<span>
Temukan smartphone premium
dengan harga terbaik.
</span>

<button>
Belanja Sekarang
</button>

</div>

</section>

<main class="container">

<div class="welcome-text">
<h2>
Hi,
<span id="username">User</span>
👋
</h2>

<p>
Temukan gadget favoritmu hari ini
</p>
</div>

<div id="search-bar"></div>

<section class="recommendation-section">

<div class="section-title">
<div class="line"></div>
<h2>
Rekomendasi Untukmu
</h2>
</div>

<div
class="product-grid"
id="recommendation-list"
></div>

</section>

<!-- trending di hide dulu -->
<section
class="trending-section"
style="display:none"
>

<div class="section-title">
<div class="line"></div>
<h2>
Trending Products
</h2>
</div>

<div
class="product-grid"
id="trending-list"
></div>

</section>

<!-- auto generate category dari seller upload -->
<div class="category-list"></div>

<div class="section-title">
<div class="line"></div>

<h2>
Semua Produk
</h2>

</div>

<div
class="product-grid"
id="product-list"
></div>

</main>

<!-- CHECKOUT MODAL -->
<div
id="checkout-modal"
class="modal"
style="display:none"
>

<div class="modal-content">

<h2>
Checkout
</h2>

<div id="checkout-items"></div>

<h3 id="checkout-total">
Rp 0
</h3>

<input
id="shipping-address"
type="text"
placeholder="Alamat Pengiriman"
/>

<select id="shipping-courier">

<option value="J&T Express">
J&T Express
</option>

<option value="JNE">
JNE
</option>

<option value="AnterAja">
AnterAja
</option>

<option value="GoSend">
GoSend
</option>

<option value="Grab Express">
Grab Express
</option>

</select>

<select id="payment-method">

<option value="BCA Transfer">
BCA Transfer
</option>

<option value="Mandiri Transfer">
Mandiri Transfer
</option>

<option value="BNI Transfer">
BNI Transfer
</option>

<option value="BRI Transfer">
BRI Transfer
</option>

<option value="DANA">
DANA
</option>

<option value="GoPay">
GoPay
</option>

<option value="OVO">
OVO
</option>

</select>

<input
type="file"
id="payment-proof"
accept="image/*"
/>

<button
id="checkout-btn"
onclick="checkoutOrder()"
>
Bayar Sekarang
</button>

<button
onclick="closeCheckoutModal()"
>
Tutup
</button>

</div>
</div>

<nav class="bottom-nav">

<a
href="index.html"
class="nav-item active"
>
<i class="fa-solid fa-house"></i>
<span>Home</span>
</a>

<a
href="wishlist.html"
class="nav-item"
>
<i class="fa-solid fa-heart"></i>
<span>Wishlist</span>
</a>

<a
href="orders.html"
class="nav-item"
>
<i class="fa-solid fa-receipt"></i>
<span>Transaksi</span>
</a>

<a
href="profile.html"
class="nav-item"
>
<i class="fa-solid fa-user"></i>
<span>Akun</span>
</a>

</nav>

<script src="js/utils/auth.js"></script>
<script src="js/store/authStore.js"></script>
<script src="js/store/cartStore.js"></script>
<script src="js/store/productStore.js"></script>
<script src="js/api/productApi.js"></script>
<script src="js/components/productCard.js"></script>
<script src="js/components/searchBar.js"></script>
<script src="js/components/checkoutModal.js"></script>
<script src="js/pages/home.js"></script>

</body>
</html>
