<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    AL Gadget
  </title>

  <!-- FONT AWESOME -->

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <!-- CSS -->

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

  <!-- AUTH CHECK -->

  <script>

    const currentUser =
    JSON.parse(
      localStorage.getItem(
        'user'
      )
    );

    if(!currentUser){

      window.location.href =
      'login.html';

    }

  </script>

  <!-- TOPBAR -->

  <div class="topbar">

    <div class="logo">
      AL
    </div>

    <div class="search-box">

      <i class="fa-solid fa-magnifying-glass"></i>

      <input
        type="text"
        placeholder="Cari smartphone..."
        id="search-input"
      />

    </div>

    <a
      href="cart.html"
      class="cart-btn"
    >

      <i class="fa-solid fa-cart-shopping"></i>

      <div id="cart-count">
        0
      </div>

    </a>

  </div>

  <!-- CONTAINER -->

  <div class="container">

    <!-- USER -->

    <div class="section-title">

      <h2>
        Hi,
        <span id="username">
          User
        </span>
      </h2>

    </div>

    <!-- CATEGORY -->

    <div class="category-scroll">

      <button class="category active">
        Semua
      </button>

      <button class="category">
        iPhone
      </button>

      <button class="category">
        Samsung
      </button>

      <button class="category">
        Xiaomi
      </button>

      <button class="category">
        Gaming
      </button>

      <button class="category">
        Murah
      </button>

    </div>

    <!-- PRODUCT -->

    <div class="section-title">

      <h2>
        Produk
      </h2>

    </div>

    <div
      class="product-grid"
      id="products"
    >

      <!-- CARD -->

      <div class="product-card">

        <div class="product-image-wrap">

          <img
            src="https://images.unsplash.com/photo-1592750475338-74b7b21085ab?q=80&w=1200&auto=format&fit=crop"
            class="product-image"
          />

          <div class="product-badge">
            HOT
          </div>

        </div>

        <div class="product-content">

          <div class="product-category">
            IPHONE
          </div>

          <h3 class="product-title">
            iPhone 15 Pro Max
          </h3>

          <div class="product-price">
            Rp 24.999.000
          </div>

          <div class="product-meta">

            ⭐ 4.9

            •

            Terjual 120

          </div>

          <button class="buy-btn">

            + Keranjang

          </button>

        </div>

      </div>

      <!-- CARD -->

      <div class="product-card">

        <div class="product-image-wrap">

          <img
            src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1200&auto=format&fit=crop"
            class="product-image"
          />

          <div class="product-badge">
            NEW
          </div>

        </div>

        <div class="product-content">

          <div class="product-category">
            SAMSUNG
          </div>

          <h3 class="product-title">
            Samsung S24 Ultra
          </h3>

          <div class="product-price">
            Rp 21.499.000
          </div>

          <div class="product-meta">

            ⭐ 4.8

            •

            Terjual 98

          </div>

          <button class="buy-btn">

            + Keranjang

          </button>

        </div>

      </div>

    </div>

  </div>

  <!-- FLOAT NAVBAR -->

  <div class="bottom-nav">

    <a
      href="index.html"
      class="nav-item active"
    >

      <i class="fa-solid fa-house"></i>

      <span>HOME</span>

    </a>

    <a
      href="wishlist.html"
      class="nav-item"
    >

      <i class="fa-solid fa-heart"></i>

      <span>WISHLIST</span>

    </a>

    <a
      href="transaction.html"
      class="nav-item"
    >

      <i class="fa-solid fa-receipt"></i>

      <span>TRANSAKSI</span>

    </a>

    <a
      href="profile.html"
      class="nav-item"
    >

      <i class="fa-solid fa-user"></i>

      <span>AKUN</span>

    </a>

  </div>

  <!-- SCRIPT -->

  <script>

    document.getElementById(
      'username'
    ).innerText =
    currentUser.username ||
    'User';

    let cart =
    JSON.parse(
      localStorage.getItem(
        'cart'
      )
    ) || [];

    document.getElementById(
      'cart-count'
    ).innerText =
    cart.length;

    const buyButtons =
    document.querySelectorAll(
      '.buy-btn'
    );

    buyButtons.forEach(
      button=>{

        button.addEventListener(
          'click',
          ()=>{

            alert(
              'Produk masuk keranjang'
            );

          }
        );

      }
    );

  </script>

</body>

</html>
