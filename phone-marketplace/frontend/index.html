<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
AL Gadget
</title>

<link
rel="stylesheet"
href="css/style.css"
/>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

</head>

<body>

<script>

const currentUser =
JSON.parse(
localStorage.getItem(
'user'
)
);

if(!currentUser){

window.location.href =
'login.html';

}

</script>

<!-- TOPBAR -->

<header class="topbar">

<div class="logo">
AL
</div>

<div class="search-box">

<i class="fa-solid fa-magnifying-glass"></i>

<input
type="text"
placeholder="Cari smartphone..."
id="searchInput"
/>

</div>

<a
href="cart.html"
class="cart-btn"
>

<i class="fa-solid fa-cart-shopping"></i>

<span id="cart-count">
0
</span>

</a>

</header>

<!-- CONTAINER -->

<div class="container">

<!-- HERO -->

<section class="hero-banner">

<img
src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=1200"
alt="banner"
/>

<div class="hero-content">

<span class="hero-tag">
PREMIUM SMARTPHONE
</span>

<h1>
Upgrade Gadget Terbaik
</h1>

<p>
Temukan smartphone premium dengan harga terbaik.
</p>

<button class="btn-primary">
Belanja Sekarang
</button>

</div>

</section>

<!-- USER -->

<div class="welcome-box">

<h2>
Hi,
<span id="usernameText">
User
</span>
👋
</h2>

<p>
Temukan gadget favoritmu hari ini
</p>

</div>

<!-- CATEGORY -->

<div class="category-scroll">

<button class="category active">
Semua
</button>

<button class="category">
iPhone
</button>

<button class="category">
Samsung
</button>

<button class="category">
Xiaomi
</button>

<button class="category">
Gaming
</button>

<button class="category">
Murah
</button>

</div>

<!-- TITLE -->

<div class="section-title">

<h2>
Produk
</h2>

</div>

<!-- PRODUCTS -->

<div
class="product-grid"
id="productGrid"
>

</div>

</div>

<!-- NAVBAR -->

<div class="bottom-nav">

<a
href="index.html"
class="nav-item active"
>

<i class="fa-solid fa-house"></i>

<span>
Home
</span>

</a>

<a
href="wishlist.html"
class="nav-item"
>

<i class="fa-solid fa-heart"></i>

<span>
Wishlist
</span>

</a>

<a
href="transaction.html"
class="nav-item"
>

<i class="fa-solid fa-receipt"></i>

<span>
Transaksi
</span>

</a>

<a
href="profile.html"
class="nav-item"
>

<i class="fa-solid fa-user"></i>

<span>
Akun
</span>

</a>

</div>

<script>

const BASE_URL =
'https://asvex-backend-production.up.railway.app/api';

document.getElementById(
'usernameText'
).innerText =
currentUser.username ||
'User';

let cart =
JSON.parse(
localStorage.getItem(
'cart'
)
) || [];

document.getElementById(
'cart-count'
).innerText =
cart.length;

const productGrid =
document.getElementById(
'productGrid'
);

async function loadProducts(){

try{

const response =
await fetch(
`${BASE_URL}/products`
);

const products =
await response.json();

productGrid.innerHTML = '';

if(!products.length){

productGrid.innerHTML = `

<div class="empty-state">

Produk belum tersedia

</div>

`;

return;

}

products.forEach(product=>{

productGrid.innerHTML += `

<div class="product-card">

<div class="product-image-wrap">

<img
src="${product.image}"
class="product-image"
/>

<div class="product-badge">
HOT
</div>

</div>

<div class="product-content">

<div class="product-category">

${product.category || 'SMARTPHONE'}

</div>

<h3 class="product-title">

${product.name}

</h3>

<div class="product-price">

Rp ${Number(product.price)
.toLocaleString('id-ID')}

</div>

<div class="product-meta">

⭐ ${product.rating || '5.0'}

•

Terjual ${product.sold || '0'}

</div>

<button
class="buy-btn"
onclick='addToCart(${JSON.stringify(product)})'
>

+ Keranjang

</button>

</div>

</div>

`;

});

}catch(err){

console.log(err);

productGrid.innerHTML = `

<div class="empty-state">

Gagal memuat produk

</div>

`;

}

}

function addToCart(product){

cart.push(product);

localStorage.setItem(
'cart',
JSON.stringify(cart)
);

document.getElementById(
'cart-count'
).innerText =
cart.length;

alert(
'Produk masuk keranjang'
);

}

loadProducts();

</script>

</body>
</html>
