<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    PHONE MARKETPLACE
  </title>

  <link
    rel="stylesheet"
    href="./css/style.css"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

</head>

<body>

<header class="topbar">

  <div class="logo">
    AL GADGET
  </div>

  <div class="search-box">

    <i class="fa fa-search"></i>

    <input
      type="text"
      placeholder="Cari HP gaming..."
    />

  </div>

  <div
    class="cart-btn"
    onclick="
      window.location.href=
      'cart.html'
    "
  >

    <i class="fa fa-shopping-cart"></i>

    <span id="cart-count">
      0
    </span>

  </div>

</header>

  <main class="container">

    <section class="hero-slider">

      <img
        src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"
      />

    </section>

    <section class="category-list">

      <div class="category">
        iPhone
      </div>

      <div class="category">
        Samsung
      </div>

      <div class="category">
        Xiaomi
      </div>

      <div class="category">
        Gaming
      </div>

      <div class="category">
        Flagship
      </div>

    </section>

    <section>

      <div class="section-header">

        <h2>
          🔥 Flash Sale
        </h2>

        <span>
          Lihat Semua
        </span>

      </div>

      <div
        id="flash-sale"
        class="product-grid"
      ></div>

    </section>

    <section>

      <div class="section-header">

        <h2>
          Semua Produk
        </h2>

      </div>

      <div
        id="products"
        class="product-grid"
      ></div>

    </section>

  </main>

  <nav class="bottom-nav">

    <div class="bottom-nav">

  <a
    href="index.html"
    class="nav-item active"
  >

    <i class="fa-solid fa-house"></i>

    <span>HOME</span>

  </a>

  <a
    href="wishlist.html"
    class="nav-item"
  >

    <i class="fa-solid fa-heart"></i>

    <span>WISHLIST</span>

  </a>

  <a
    href="transaction.html"
    class="nav-item"
  >

    <i class="fa-solid fa-receipt"></i>

    <span>TRANSAKSI</span>

  </a>

  <a
    href="profile.html"
    class="nav-item"
  >

    <i class="fa-solid fa-user"></i>

    <span>AKUN</span>

  </a>

</div>

  </nav>

  <script
    type="module"
    src="./js/pages/home.js"
  ></script>

</body>

</html>
