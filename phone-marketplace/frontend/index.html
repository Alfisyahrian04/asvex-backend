<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    AL STORE
  </title>

  <link
    rel="stylesheet"
    href="./css/style.css"
  />

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

</head>

<body>

  <!-- TOPBAR -->

  <div class="topbar">

    <div class="logo">
      AL
    </div>

    <div class="search-box">

      <i class="fa-solid fa-magnifying-glass"></i>

      <input
        type="text"
        placeholder="Cari Gadget..."
      />

    </div>

    <div
      class="cart-btn"
      onclick="
        window.location.href=
        'cart.html'
      "
    >

      <i class="fa-solid fa-cart-shopping"></i>

      <span id="cart-count">
        0
      </span>

    </div>

  </div>

  <!-- CONTAINER -->

  <div class="container">

    <!-- FLASH SALE -->

    <div class="section-title">

      <h2>
        FLASH SALE
      </h2>

    </div>

    <div
      class="product-grid"
      id="flash-sale"
    ></div>

    <!-- ALL PRODUCT -->

    <div
      class="section-title"
      style="
        margin-top:40px;
      "
    >

      <h2>
        ALL PRODUCT
      </h2>

    </div>

    <div
      class="product-grid"
      id="products"
    ></div>

  </div>

  <!-- FLOAT NAVBAR -->

  <div class="bottom-nav">

    <a
      href="index.html"
      class="nav-item active"
    >

      <i class="fa-solid fa-house"></i>

      <span>HOME</span>

    </a>

    <a
      href="wishlist.html"
      class="nav-item"
    >

      <i class="fa-solid fa-heart"></i>

      <span>WISHLIST</span>

    </a>

    <a
      href="transaction.html"
      class="nav-item"
    >

      <i class="fa-solid fa-receipt"></i>

      <span>TRANSAKSI</span>

    </a>

    <a
      href="profile.html"
      class="nav-item"
    >

      <i class="fa-solid fa-user"></i>

      <span>AKUN</span>

    </a>

  </div>

  <script
    type="module"
    src="./js/pages/home.js"
  ></script>

</body>

</html>
