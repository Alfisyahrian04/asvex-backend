<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    PHONE MARKETPLACE
  </title>

  <link
    rel="stylesheet"
    href="./css/style.css"
  />

</head>

<body>

  <nav class="navbar">

    <div class="logo">
      PHONE MARKETPLACE
    </div>

    <input
      type="text"
      placeholder="Cari HP..."
    />

  </nav>

  <main class="container">

    <section class="hero">

      <img
        src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"
      />

    </section>

    <section>

      <h2 class="section-title">
        Flash Sale
      </h2>

      <div
        id="flash-sale"
        class="product-grid"
      ></div>

    </section>

    <section>

      <h2 class="section-title">
        Semua Produk
      </h2>

      <div
        id="products"
        class="product-grid"
      ></div>

    </section>

  </main>

  <script
    type="module"
    src="./js/pages/home.js"
  ></script>

</body>

</html>
