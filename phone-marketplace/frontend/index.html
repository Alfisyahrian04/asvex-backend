<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    PHONE MARKETPLACE
  </title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    rel="stylesheet"
    href="./css/style.css"
  />

</head>

<body class="bg-gray-100">

  <div id="navbar"></div>

  <main
    class="max-w-7xl mx-auto p-4"
  >

    <section
      class="banner rounded-3xl overflow-hidden mb-6"
    >

      <img
        src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"
        class="w-full h-64 object-cover"
      />

    </section>

    <section class="mb-8">

      <h2
        class="text-2xl font-bold mb-4"
      >
        Flash Sale
      </h2>

      <div
        id="flashSale"
        class="grid grid-cols-2 md:grid-cols-5 gap-4"
      ></div>

    </section>

    <section>

      <h2
        class="text-2xl font-bold mb-4"
      >
        Semua Produk
      </h2>

      <div
        id="productGrid"
        class="grid grid-cols-2 md:grid-cols-5 gap-4"
      ></div>

    </section>

  </main>

  <script
    type="module"
    src="./js/pages/home.js"
  ></script>

</body>

</html>
