<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>Admin Profile</title>

<link
rel="stylesheet"
href="./css/admin.css?v=999"
/>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

</head>

<body>

<header class="admin-topbar">

<div class="admin-logo">
AL ADMIN
</div>

<div class="admin-badge">
SUPER ADMIN
</div>

</header>

<main class="profile-page">

<section class="profile-card">

<div class="section-title">
<div class="line"></div>
<h2>Profile Admin</h2>
</div>

<div class="profile-form">

<div class="input-group">
<input
type="text"
id="admin-name"
placeholder="Nama Admin"
readonly
disabled
tabindex="-1"
style="pointer-events:none;"
/>
</div>

<div class="input-group">
<input
type="email"
id="admin-email"
placeholder="Email"
readonly
disabled
tabindex="-1"
style="pointer-events:none;"
/>
</div>

<div class="input-group">
<input
type="text"
id="admin-phone"
placeholder="Nomor Telepon"
/>
</div>

</div>
</section>

<section class="password-section">

<div class="section-title">
<div class="line"></div>
<h2>Ganti Password</h2>
</div>

<div class="password-form">

<div class="input-group">
<input
type="password"
id="old-password"
placeholder="Password Lama"
/>
<span
class="toggle-password"
onclick="togglePassword('old-password')"
>
<i class="fa-solid fa-eye"></i>
</span>
</div>

<div class="input-group">
<input
type="password"
id="new-password"
placeholder="Password Baru"
/>
<span
class="toggle-password"
onclick="togglePassword('new-password')"
>
<i class="fa-solid fa-eye"></i>
</span>
</div>

<div class="input-group">
<input
type="password"
id="confirm-password"
placeholder="Konfirmasi Password Baru"
/>
<span
class="toggle-password"
onclick="togglePassword('confirm-password')"
>
<i class="fa-solid fa-eye"></i>
</span>
</div>

<button
id="save-password-btn"
class="save-password-btn"
>
Simpan Password
</button>

<button
type="button"
id="logout-btn"
class="logout-btn"
onclick="localStorage.removeItem('token');localStorage.removeItem('user');window.location.href='/login.html';"
>
Logout
</button>

</div>

</section>

</main>

<nav class="admin-nav">

<a
href="admin.html"
class="admin-nav-item"
>
<i class="fa-solid fa-chart-line"></i>
<span>Dashboard</span>
</a>

<a
href="admin-transaksi.html"
class="admin-nav-item"
>
<i class="fa-solid fa-money-check-dollar"></i>
<span>Transaksi</span>
</a>

<a
href="admin-seller.html"
class="admin-nav-item"
>
<i class="fa-solid fa-store"></i>
<span>Seller</span>
</a>

<a
href="#"
class="admin-nav-item"
>
<i class="fa-solid fa-headset"></i>
<span>CS</span>
</a>

<a
href="admin-profile.html"
class="admin-nav-item active"
>
<i class="fa-solid fa-user-shield"></i>
<span>Akun</span>
</a>

</nav>

<script src="./js/pages/admin-profile.js?v=999"></script>

</body>
</html>
