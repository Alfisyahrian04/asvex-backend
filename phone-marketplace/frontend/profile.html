<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Profile
  </title>

  <link
    rel="stylesheet"
    href="./css/style.css"
  />

</head>

<body>

  <header class="topbar">

    <div class="logo">
      Profile
    </div>

  </header>

  <main class="container">

    <div class="profile-card">

      <div class="profile-avatar">

        <i class="fa fa-user"></i>

      </div>

      <h2 id="profile-name">
        Loading...
      </h2>

      <p id="profile-email">
        Loading...
      </p>

      <button
        id="logout-btn"
        class="btn-primary"
      >

        Logout

      </button>

    </div>

  </main>

  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"
  ></script>

  <script
    type="module"
    src="./js/pages/profile.js"
  ></script>

</body>

</html>
