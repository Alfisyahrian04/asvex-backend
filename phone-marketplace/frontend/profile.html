<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Profile - AL Gadget
  </title>

  <!-- FONT AWESOME -->

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <!-- CSS -->

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

  <script>

    const currentUser =
    JSON.parse(
      localStorage.getItem(
        'user'
      )
    );

    if(!currentUser){

      window.location.href =
      'login.html';

    }

  </script>

  <!-- TOPBAR -->

  <div class="topbar">

    <div class="logo">
      Profile
    </div>

  </div>

  <!-- CONTENT -->

  <div class="container">

    <div class="profile-card">

      <!-- AVATAR -->

      <div class="profile-avatar">

        <i class="fa-solid fa-user"></i>

      </div>

      <!-- USERNAME -->

      <div
        class="profile-name"
        id="profile-name"
      >
        USER
      </div>

      <!-- EMAIL -->

      <div
        class="profile-email"
        id="profile-email"
      >
        user@gmail.com
      </div>

      <!-- ROLE -->

      <div
        class="profile-role"
        id="profile-role"
      >
        Buyer
      </div>

      <!-- MENU -->

      <div class="profile-menu">

        <a
          href="transaction.html"
          class="profile-menu-item"
        >

          <i class="fa-solid fa-clock-rotate-left"></i>

          <span>
            Riwayat Transaksi
          </span>

        </a>

        <a
          href="wishlist.html"
          class="profile-menu-item"
        >

          <i class="fa-solid fa-heart"></i>

          <span>
            Wishlist
          </span>

        </a>

      </div>

      <!-- LOGOUT -->

      <button
        class="btn-primary"
        onclick="logout()"
      >

        <i class="fa-solid fa-right-from-bracket"></i>

        Logout

      </button>

    </div>

  </div>

  <!-- FLOAT NAVBAR -->

  <div class="bottom-nav">

    <a
      href="index.html"
      class="nav-item"
    >

      <i class="fa-solid fa-house"></i>

      <span>HOME</span>

    </a>

    <a
      href="wishlist.html"
      class="nav-item"
    >

      <i class="fa-solid fa-heart"></i>

      <span>WISHLIST</span>

    </a>

    <a
      href="transaction.html"
      class="nav-item"
    >

      <i class="fa-solid fa-receipt"></i>

      <span>TRANSAKSI</span>

    </a>

    <a
      href="profile.html"
      class="nav-item active"
    >

      <i class="fa-solid fa-user"></i>

      <span>AKUN</span>

    </a>

  </div>

  <!-- SCRIPT -->

  <script>

    document.getElementById(
      'profile-name'
    ).innerText =
    currentUser.username ||
    'USER';

    document.getElementById(
      'profile-email'
    ).innerText =
    currentUser.email ||
    'user@gmail.com';

    document.getElementById(
      'profile-role'
    ).innerText =
    currentUser.role ||
    'Buyer';

    function logout(){

      localStorage.removeItem(
        'user'
      );

      localStorage.removeItem(
        'token'
      );

      window.location.href =
      'login.html';

    }

  </script>

</body>

</html>
