<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Profile - AL Gadget
</title>

<link
rel="stylesheet"
href="css/style.css"
/>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

</head>

<body>

<script>

const currentUser =
JSON.parse(
localStorage.getItem(
'user'
)
);

if(!currentUser){

window.location.href =
'login.html';

}

</script>

<!-- TOPBAR -->

<header class="topbar">

<div class="logo">
Profile
</div>

</header>

<!-- CONTENT -->

<div class="container">

<div class="profile-card">

<div class="profile-avatar">

<i class="fa-solid fa-user"></i>

</div>

<h2 class="profile-name">

<span id="profileName">
USER
</span>

</h2>

<p class="profile-email">

<span id="profileEmail">
user@gmail.com
</span>

</p>

<div class="profile-role">

<span id="profileRole">
Buyer
</span>

</div>

<div class="profile-menu">

<a
href="transaction.html"
class="profile-menu-item"
>

<i class="fa-solid fa-clock-rotate-left"></i>

<span>
Riwayat Transaksi
</span>

</a>

<a
href="wishlist.html"
class="profile-menu-item"
>

<i class="fa-solid fa-heart"></i>

<span>
Wishlist
</span>

</a>

</div>

<button
class="btn-primary"
onclick="logout()"
>

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</button>

</div>

</div>

<!-- NAVBAR -->

<div class="bottom-nav">

<a
href="index.html"
class="nav-item"
>

<i class="fa-solid fa-house"></i>

<span>
Home
</span>

</a>

<a
href="wishlist.html"
class="nav-item"
>

<i class="fa-solid fa-heart"></i>

<span>
Wishlist
</span>

</a>

<a
href="transaction.html"
class="nav-item"
>

<i class="fa-solid fa-receipt"></i>

<span>
Transaksi
</span>

</a>

<a
href="profile.html"
class="nav-item active"
>

<i class="fa-solid fa-user"></i>

<span>
Akun
</span>

</a>

</div>

<script>

document.getElementById(
'profileName'
).innerText =
currentUser.username ||
'USER';

document.getElementById(
'profileEmail'
).innerText =
currentUser.email ||
'user@gmail.com';

document.getElementById(
'profileRole'
).innerText =
currentUser.role ||
'Buyer';

function logout(){

localStorage.removeItem(
'user'
);

localStorage.removeItem(
'token'
);

window.location.href =
'login.html';

}

</script>

</body>
</html>
