<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Profile
</title>

<link
rel="stylesheet"
href="css/style.css"
/>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

</head>

<body>

<header class="topbar">

<h1
style="
font-size:2.3rem;
font-weight:900;
color:#2563eb;
font-style:italic;
"
>
Profile
</h1>

</header>

<main class="container">

<div class="profile-card">

<div class="profile-avatar">

<i class="fa-solid fa-user"></i>

</div>

<h2 id="profile-name">
User
</h2>

<p id="profile-email">
-
</p>

<div class="profile-role">
buyer
</div>

<div class="profile-menu">

<a
href="orders.html"
class="profile-menu-item"
>

<i class="fa-solid fa-clock-rotate-left"></i>

<span>
Riwayat Transaksi
</span>

</a>

<a
href="wishlist.html"
class="profile-menu-item"
>

<i class="fa-solid fa-heart"></i>

<span>
Wishlist
</span>

</a>

</div>

<button
class="logout-btn"
onclick="logout()"
>

<i class="fa-solid fa-right-from-bracket"></i>
Logout

</button>

</div>

</main>

<nav class="bottom-nav">

<a
href="index.html"
class="nav-item"
>

<i class="fa-solid fa-house"></i>

<span>
Home
</span>

</a>

<a
href="wishlist.html"
class="nav-item"
>

<i class="fa-solid fa-heart"></i>

<span>
Wishlist
</span>

</a>

<a
href="orders.html"
class="nav-item"
>

<i class="fa-solid fa-receipt"></i>

<span>
Transaksi
</span>

</a>

<a
href="profile.html"
class="nav-item active"
>

<i class="fa-solid fa-user"></i>

<span>
Akun
</span>

</a>

</nav>

<script>

const user =
JSON.parse(
localStorage.getItem('user')
);

if(!user){

window.location.href =
'login.html';

}

document.getElementById(
'profile-name'
).innerText =
user.username || 'User';

document.getElementById(
'profile-email'
).innerText =
user.email || '-';

document.querySelector(
'.profile-role'
).innerText =
user.role || 'buyer';

function logout(){

localStorage.removeItem('token');
localStorage.removeItem('user');

window.location.href =
'login.html';

}

</script>

</body>
</html>
