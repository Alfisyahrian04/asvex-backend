<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8" />

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Login - AL Gadget
</title>

<link
rel="stylesheet"
href="css/style.css"
/>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

</head>

<body class="auth-page">

<div class="auth-wrapper">

<div class="auth-card">

<div class="auth-logo">
AL
</div>

<h1>
Welcome Back
</h1>

<p>
Login untuk lanjut ke marketplace
</p>

<form id="loginForm">

<div class="input-group">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Email"
required
/>

</div>

<div class="input-group">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
placeholder="Password"
required
/>

</div>

<button
type="submit"
class="auth-btn"
>

Login

</button>

</form>

<div class="auth-links">

<a href="#">
Lupa Password
</a>

<a href="register.html">
Register
</a>

</div>

</div>

</div>

<script
type="module"
src="js/pages/login.js"
></script>

</body>
</html>
