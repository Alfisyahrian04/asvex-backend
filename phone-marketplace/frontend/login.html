<!DOCTYPE html>
<html lang="id">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    Login
  </title>

  <link
    rel="stylesheet"
    href="./css/style.css"
  />

</head>

<body>

  <div class="auth-container">

    <form id="login-form">

      <h1>
        Login
      </h1>

      <input
        type="email"
        id="email"
        placeholder="Email"
        required
      />

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
      />

      <button
        type="submit"
        class="btn-primary"
      >

        Login

      </button>

      <p>

        Belum punya akun?

        <a href="./register.html">
          Register
        </a>

      </p>

    </form>

  </div>

  <script
    type="module"
    src="./js/pages/login.js"
  ></script>

</body>

</html>
