<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>
Login - AL Gadget
</title>

<link
rel="stylesheet"
href="css/style.css"
/>

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

</head>

<body>

<div class="auth-page">

  <div class="auth-card">

    <div class="auth-logo">
      AL
    </div>

    <h1>
      Welcome Back
    </h1>

    <p>
      Login untuk lanjut
    </p>

    <form id="loginForm">

      <div class="input-group">

        <i class="fa-solid fa-envelope"></i>

        <input
        type="email"
        id="email"
        placeholder="Email"
        required
        />

      </div>

      <div class="input-group">

        <i class="fa-solid fa-lock"></i>

        <input
        type="password"
        id="password"
        placeholder="Password"
        required
        />

      </div>

      <button
      type="submit"
      class="btn-primary"
      >
      Login
      </button>

    </form>

    <div class="auth-links">

      <a href="#">
        Lupa Password
      </a>

      <a href="register.html">
        Register
      </a>

    </div>

  </div>

</div>

<script>

const currentUser =
JSON.parse(
localStorage.getItem('user')
);

if(currentUser){

window.location.href =
'index.html';

}

const loginForm =
document.getElementById(
'loginForm'
);

loginForm.addEventListener(
'submit',
async(e)=>{

e.preventDefault();

const email =
document.getElementById(
'email'
).value;

const password =
document.getElementById(
'password'
).value;

try{

const response =
await fetch(
'https://asvex-backend-production.up.railway.app/api/auth/login',
{
method:'POST',
headers:{
'Content-Type':
'application/json'
},
body:JSON.stringify({
email,
password
})
}
);

const data =
await response.json();

if(!response.ok){

alert(
data.message
);

return;

}

localStorage.setItem(
'user',
JSON.stringify(
data.user
)
);

localStorage.setItem(
'token',
data.token
);

window.location.href =
'index.html';

}catch(err){

console.log(err);

alert(
'Login gagal'
);

}

}
);

</script>

</body>
</html>
